# HTTP server
server.port=8080

# PostgreSQL connection (JDBC)
db.url=jdbc:postgresql://localhost:5432/otp_service
db.adminUrl=jdbc:postgresql://localhost:5432/postgres
db.name=otp_service
db.user=postgres
db.password=root

# Auth token
token.secret=change-me-super-secret-key-for-hmac-signing-please
token.ttlSeconds=3600

# OTP defaults (used to seed the single config row on first start)
otp.defaultLength=6
otp.defaultTtlSeconds=300

# Background job that marks expired codes
otp.expiryScanIntervalSeconds=30

# Active notification channel used when a request does not specify one.
# Allowed: FILE, EMAIL, SMS, TELEGRAM
otp.defaultChannel=FILE

# File channel: codes are appended here (in project root)
otp.file.path=otp-codes.txt
