# По умолчанию настроено на ЛОКАЛЬНЫЙ эмулятор FakeSmtpServer (emulators/), порт 2525,
# без авторизации — чтобы EMAIL можно было протестировать сразу, без реальной почты.
#
# Для реальной отправки (например Gmail) замените на:
#   mail.smtp.host=smtp.gmail.com
#   mail.smtp.port=587
#   mail.smtp.auth=true
#   mail.smtp.starttls.enable=true
#   email.username/email.from = ваш адрес, email.password = app-password
# (файл читается из рабочей папки -> пересборка не нужна, достаточно перезапуска)

email.username=otp-bot
email.password=ignored
email.from=otp-bot@local.test
mail.smtp.host=localhost
mail.smtp.port=2525
mail.smtp.auth=false
mail.smtp.starttls.enable=false
